name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup iOS project
        run: |
          rm -rf ios
          flutter create --project-name clarity --platforms=ios .
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.example.clarity;/PRODUCT_BUNDLE_IDENTIFIER = com.clarity.app;/' Runner.xcodeproj/project.pbxproj
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Release.xcconfig
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Debug.xcconfig
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Profile.xcconfig
          rm -f ../test/widget_test.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-pub 2>&1 | tee /tmp/analysis.log
        continue-on-error: true

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign 2>&1 | tee /tmp/build.log

      - name: Package unsigned IPA
        if: success()
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r clarity-unsigned.ipa Payload/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Clarity-iOS-IPA
          path: clarity-unsigned.ipa

      - name: Show diagnostics on failure
        if: failure()
        run: |
          echo "# Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Analysis Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/analysis.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No analysis log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Output (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/build.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No build log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
