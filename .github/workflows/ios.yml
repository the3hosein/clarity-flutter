name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create iOS platform files
        run: |
          rm -rf ios
          flutter create --project-name clarity --platforms=ios .
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.example.clarity;/PRODUCT_BUNDLE_IDENTIFIER = com.clarity.app;/' Runner.xcodeproj/project.pbxproj

      - name: Get dependencies
        run: flutter pub get

      - name: Diagnostic info
        run: |
          echo "=== Flutter version ==="
          flutter --version
          echo "=== Xcode version ==="
          xcodebuild -version 2>/dev/null || echo "Xcode not found"
          echo "=== macOS version ==="
          sw_vers -productVersion 2>/dev/null || echo "sw_vers not available"
          echo "=== CocoaPods version ==="
          pod --version 2>/dev/null || echo "pod not found"
          echo "=== Dart SDK ==="
          dart --version 2>/dev/null

      - name: Run analysis
        run: flutter analyze 2>&1 | tee analysis.log

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update 2>&1 | tee pod-install.log || echo "CocoaPods setup had issues, continuing with Flutter build..."

      - name: Build unsigned iOS app
        run: |
          flutter build ios --release --no-codesign 2>&1 | tee build.log
          EXITCODE=${PIPESTATUS[0]}
          echo "=== BUILD LOG (last 50 lines) ==="
          tail -50 build.log
          echo "=== BUILD LOG END ==="
          exit $EXITCODE

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload analysis log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-log
          path: analysis.log

      - name: Upload pod-install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pod-install-log
          path: ios/pod-install.log


      - name: Package unsigned IPA
        if: success()
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r clarity-unsigned.ipa Payload/

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Clarity-iOS-IPA
          path: clarity-unsigned.ipa
