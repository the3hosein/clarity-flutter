name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup iOS project
        run: |
          rm -rf ios
          flutter create --project-name clarity --platforms=ios .
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.example.clarity;/PRODUCT_BUNDLE_IDENTIFIER = com.clarity.app;/' Runner.xcodeproj/project.pbxproj
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Release.xcconfig
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Debug.xcconfig
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Profile.xcconfig
          rm -f ../test/widget_test.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        if: success()
        run: |
          # Find the .app bundle
          APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found"
            find build/ios -type d -name "*.app"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r clarity-unsigned.ipa Payload/
          echo "IPA created: $(ls -la clarity-unsigned.ipa)"

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Clarity-iOS-IPA
          path: clarity-unsigned.ipa
