name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup iOS project
        run: |
          rm -rf ios
          flutter create --project-name clarity --platforms=ios .
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.example.clarity;/PRODUCT_BUNDLE_IDENTIFIER = com.clarity.app;/' Runner.xcodeproj/project.pbxproj
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Release.xcconfig
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Debug.xcconfig
          echo 'DEVELOPMENT_TEAM=0000000000' >> Flutter/Profile.xcconfig
          rm -f ../test/widget_test.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-pub 2>&1 | tee /tmp/analysis.log || true

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign --verbose 2>&1 | tee /tmp/build.log || true

      - name: Package unsigned IPA
        if: success()
        run: |
          find build/ios -name "*.app" -type d 2>&1 || echo "No .app found"
          ls -la build/ios/ 2>&1 || true
          APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build/ios/iphoneos"
            echo "Contents of build/ios:"
            find build/ios -maxdepth 3 -type d 2>&1
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r clarity-unsigned.ipa Payload/
          echo "IPA created successfully"

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Clarity-iOS-IPA
          path: clarity-unsigned.ipa

      - name: Dump diagnostics on failure
        if: always()
        run: |
          echo "=== ANALYSIS LOG ===" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/analysis.log 2>/dev/null || echo "No analysis log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "=== BUILD LOG (last 200 lines) ===" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/build.log 2>/dev/null || echo "No build log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
