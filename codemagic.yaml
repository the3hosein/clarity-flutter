workflows:
  ios:
    name: iOS Build
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter create --project-name clarity /tmp/plat_gen
      - cp -R /tmp/plat_gen/ios .
      - cp -R /tmp/plat_gen/android .
      - flutter pub get
      - flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
  android:
    name: Android Build
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - flutter create --project-name clarity /tmp/plat_gen
      - cp -R /tmp/plat_gen/android .
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
